name: Construir APK Android

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias
        run: npm install

      - name: Construir React (Vite)
        run: npm run build

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Restaurar configuración de Network Security ⚡
        run: |
          # Asegurar que AndroidManifest.xml tiene networkSecurityConfig
          sed -i 's|android:theme="@style/AppTheme">|android:networkSecurityConfig="@xml/network_security_config"\n        android:theme="@style/AppTheme">|g' android/app/src/main/AndroidManifest.xml
          
          # Verificar que el archivo sea válido (sin duplicados)
          if grep -c 'networkSecurityConfig' android/app/src/main/AndroidManifest.xml | grep -q '2'; then
            sed -i '0,/android:networkSecurityConfig="@xml\/network_security_config"/!b' android/app/src/main/AndroidManifest.xml
          fi

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: Admin-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
